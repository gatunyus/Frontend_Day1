<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบรายงานการผลิต - โรงงานอัจฉริยะ</title>
</head>

<body
    style="font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px;">

    <header style="background-color: #2c3e50; color: white; padding: 20px; 
       text-align: center; border-radius: 10px; margin-bottom: 20px; 
 box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
        <h1 style="margin: 0;">🏭 SMART FACTORY SYSTEM</h1>
        <p style="margin: 5px 0 0 0; opacity: 0.8;">
            ระบบบันทึกข้อมูลการผลิตประจำวัน (Line A)
        </p>
    </header>

    <main style="max-width: 600px; margin: 0 auto;">

        <div style="background-color: white; padding: 30px; border-radius: 15px;     
           box-shadow: 0 10px 25px rgba(0,0,0,0.05);">
            <h2 style="color: #2c3e50; border-left: 5px solid #3498db; padding-
               left: 15px; margin-bottom: 25px;">
                บันทึกข้อมูลใหม่
            </h2>
            <form onsubmit="alert('✅ ระบบได้รับข้อมูลเรียบร้อยแล้ว! (จำลองการส่ง)'); return false;">
                <div style="margin-bottom: 20px;">
                    <label for="machineId" style="display: block; 
                        margin-bottom: 8px; font-weight: bold; color: #34495e;       
   			     cursor: pointer;">
                        เลือกรหัสเครื่องจักร:
                    </label>
                    <select id="machineId" required style="width: 100%; 
                  box-sizing: border-box; padding: 15px; font-size: 18px;    
                  border: 2px solid #ddd; border-radius: 8px; background-       
              color: #fff;">
                        <option value="">-- กรุณาเลือก --</option>
                        <option value="M01">M-01 (เครื่องซีลฝา)</option>
                        <option value="M02">M-02 (เครื่องบรรจุ)</option>
                        <option value="M03">M-03 (เครื่องติดฉลาก)</option>
                    </select>
                </div>
                <div style="margin-bottom: 20px;">
                    <label for="workDate" style="display: block; 
                         margin-bottom: 8px; font-weight: bold; color: #34495e;         
                    cursor: pointer;">
                        วันที่ปฏิบัติงาน:
                    </label>
                    <input type="date" id="workDate" required style="width: 100%;    
                        box-sizing: border-box; padding: 12px; font-size: 18px; 
                    border: 2px solid #ddd; border-radius: 8px;">
                </div>


                <div style="margin-bottom: 20px;">
                    <label for="qty" style="display: block; margin-bottom: 8px;     
                        font-weight: bold; color: #34495e; cursor: pointer;">
                        จำนวนที่ผลิตได้ (ชิ้น):
                    </label>
                    <input type="number" id="qty" required placeholder="0" min="0" style="width: 100%; box-sizing: border-box;  
                        padding: 12px; font-size: 18px; border: 2px solid #ddd; 
                         border-radius: 8px;">
                </div>

                <div style="margin-bottom: 20px;">
                    <p style="margin-bottom: 10px; font-weight: bold; 
                        color:  #34495e;">สถานะการผลิต:</p>
                    <div style="background-color: #f8f9fa; padding: 15px; 
                        border-radius: 8px;">
                        <input type="radio" id="st1" name="status" value="ok" checked style="transform: scale(1.5); 
                           margin-right: 10px; cursor: pointer;">
                        <label for="st1" style="font-size: 18px; 
                           margin-right: 20px; cursor: pointer;">
                            🟢 ปกติ(OK)
                        </label>
                        <br><br>
                        <input type="radio" id="st2" name="status" value="ng" style="transform: scale(1.5); margin-right: 10px; 
                        cursor: pointer;">
                        <label for="st2" style="font-size: 18px; 
                        cursor: pointer;">
                            🔴 พบปัญหา (NG)
                        </label>
                    </div>
                </div>

                <div style="margin-bottom: 30px;">
                    <p style="margin-bottom: 10px; font-weight: bold; 
                        color: #34495e;">รายละเอียดความผิดปกติ (ถ้ามี):
                    </p>
                    <input type="checkbox" id="c1" name="issue" value="temp" style="transform: scale(1.5); margin-right: 10px; 
                    cursor: pointer;">
                    <label for="c1" style="font-size: 16px; cursor: pointer;">
                        อุณหภูมิสูงเกิน</label><br><br>
                    <input type="checkbox" id="c2" name="issue" value="noise" style="transform: scale(1.5); margin-right: 10px; 
                     cursor: pointer;">
                    <label for="c2" style="font-size: 16px; cursor: pointer;">
                        มีเสียงดังผิดปกติ
                    </label>
                </div>

                <button type="submit" style="
                    width: 100%; 
                    padding: 20px; 
                    font-size: 24px; 
                    background-color: #4CAF50; 
                    color: white; 
                    border: none; 
                    border-radius: 8px;
                    cursor: pointer;
                    font-weight: bold;
                    box-shadow: 0 5px 10px rgba(76, 175, 80, 0.3);
                ">
                    💾 บันทึกข้อมูล
                </button>

            </form>
        </div>
    </main>

    <footer style="text-align: center; margin-top: 30px; color: #7f8c8d; font-size: 14px;">
        &copy; 2026 Smart Factory Solutions - ระบบบันทึกข้อมูลหน้างาน
    </footer>

</body>

</html>
